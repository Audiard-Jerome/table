<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réviser les tables de multiplication</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Réviser les tables de multiplication</h1>
        <div class="settings">
            <label for="tables">Choisir les tables à réviser (1-10):</label>
            <input type="number" id="tables" min="1" max="10" value="1">
            <button id="startBtn">Commencer</button>
        </div>
        <div class="quiz" id="quiz" style="display: none;">
            <div id="question"></div>
            <input type="number" id="answer" placeholder="Votre réponse">
            <button id="submitBtn">Soumettre</button>
            <div id="timer">Temps restant: 5:00</div>
            <div id="score">Score: 0</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
